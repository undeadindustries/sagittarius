version: "2"

run:
  modules-download-mode: readonly
  tests: true

linters:
  default: standard
  enable:
    - misspell
    - unconvert
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$

issues:
  max-issues-per-linter: 0
  max-same-issues: 0

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/undeadindustries/sagittarius
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
